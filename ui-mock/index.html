<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>BenoQs Sequencer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────── */
:root {
  --bg:         #f0ede5;
  --bg2:        #e8e4db;
  --div:        rgba(28,24,16,.08);
  --text:       #1c1810;
  --muted:      rgba(28,24,16,.40);
  --faint:      rgba(28,24,16,.15);
  --green:      #46d020;
  --red:        #d42020;
  --amber:      #d88820;
  --pink:       #e048a0;
  --white-led:  #e8e8dc;
  --yellow-led: #d8c820;
  --accent:     #2650c0;
  --font: "Google Sans",-apple-system,"Helvetica Neue",system-ui,sans-serif;

  /* ball gradients */
  --ball-lg: radial-gradient(circle at 33% 28%, #dedad0 0%, #aaa49a 38%, #807870 68%, #605850 100%);
  --ball-md: radial-gradient(circle at 33% 28%, #d0ccc4 0%, #9e9890 40%, #787068 70%, #585048 100%);
  --ball-sm: radial-gradient(circle at 35% 30%, #c8c4bc 0%, #989088 45%, #706860 75%, #504840 100%);
  --ball-on: radial-gradient(circle at 35% 30%, #484038 0%, #201c18 100%);
  --ball-shadow: 0 1.5px 4px rgba(0,0,0,.32), inset 0 1px 2px rgba(255,255,255,.38);
  --ball-shadow-lg: 0 2px 7px rgba(0,0,0,.36), inset 0 1.5px 3px rgba(255,255,255,.42);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ─────────────────────────────────────────────────────
   SHELL
───────────────────────────────────────────────────── */
.device {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
}

/* ─────────────────────────────────────────────────────
   TOP BAR
───────────────────────────────────────────────────── */
.top-bar {
  flex-shrink: 0;
  height: 26px;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  border-bottom: 1px solid var(--div);
}
.brand {
  font-size: 9px; letter-spacing: .14em;
  text-transform: none; color: var(--muted);
}
.model {
  font-size: 16px; font-style: italic;
  letter-spacing: .22em; color: var(--text);
  font-weight: 300;
}

/* ─────────────────────────────────────────────────────
   WORKSPACE  (left panel + right panel)
───────────────────────────────────────────────────── */
.workspace {
  flex: 1; min-height: 0;
  display: flex;
}

/* ═══════════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════════ */
.panel-left {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--div);
}

/* ── Matrix region (fills height, flex row) ── */
.matrix-region {
  flex: 1; min-height: 0;
  display: flex; align-items: stretch;
  padding: 8px 0 6px 0;
  gap: 0;
}

/* ── Clef column ── */
.clef-col {
  flex-shrink: 0; width: 18px;
  display: flex; flex-direction: column;
  justify-content: space-around; align-items: center;
  padding: 8px 0;
}
.clef-sym {
  font-size: 28px; line-height: 1;
  color: var(--faint);
  transform: scaleY(.85);
}

/* ── Side ball columns (MIX / SEL / MUT / EDIT) ── */
.ball-col {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  justify-content: space-around; align-items: center;
  position: relative;
}
.ball-col-label {
  position: absolute; bottom: -14px; left: 50%;
  transform: translateX(-50%);
  font-size: 6px; letter-spacing: .13em;
  text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
}
.ball-col.mix  { width: 28px; padding: 0 2px; }
.ball-col.sel  { width: 20px; }
.ball-col.mut  { width: 20px; }
.ball-col.edit { width: 28px; padding: 0 2px; }

/* ── Individual ball sizes ── */
.ball {
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}
.ball::before {          /* shine */
  content: '';
  position: absolute; top: 17%; left: 22%;
  width: 28%; height: 28%; border-radius: 50%;
  background: rgba(255,255,255,.55);
  pointer-events: none;
}
.ball.sz-lg {
  width: 22px; height: 22px;
  background: var(--ball-lg);
  box-shadow: var(--ball-shadow-lg);
}
.ball.sz-md {
  width: 16px; height: 16px;
  background: var(--ball-md);
  box-shadow: var(--ball-shadow);
}
.ball.sz-sm {
  width: 11px; height: 11px;
  background: var(--ball-sm);
  box-shadow: var(--ball-shadow);
}

/* LED dot under each side ball */
.ball-led {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(28,24,16,.10);
  flex-shrink: 0;
  transition: background .06s;
}
.ball-led.green  { background: var(--green);  box-shadow: 0 0 3px var(--green); }
.ball-led.red    { background: var(--red);    box-shadow: 0 0 3px var(--red);   }
.ball-led.amber  { background: var(--amber);  box-shadow: 0 0 2px var(--amber); }
.ball-led.yellow { background: var(--yellow-led); }
.ball-led.pink   { background: var(--pink);   box-shadow: 0 0 2px var(--pink);  }

/* ── Attr + Matrix core ── */
.matrix-core {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
}

/* Attr strip left of grid */
.attr-row-labels {
  flex: 1; min-height: 0;
  display: flex; align-items: stretch;
}
.attr-lhs {
  flex-shrink: 0; width: 26px;
  display: flex; flex-direction: column;
  justify-content: space-around; align-items: flex-end;
  padding-right: 3px;
}
.attr-lbl {
  font-size: 6.5px; letter-spacing: .05em;
  text-transform: uppercase; color: var(--muted);
  cursor: pointer; line-height: 1;
  transition: color .1s;
}
.attr-lbl.active { color: var(--text); font-weight: 600; }
.attr-lbl:hover  { color: var(--text); }

/* ── Step grid ── */
.step-grid {
  flex: 1; min-width: 0; min-height: 0;
  display: grid;
  /* 4 groups of 4 steps, with a 5px gap between groups */
  grid-template-columns: repeat(4, repeat(4, 1fr) 5px);
  grid-template-rows: repeat(10, 1fr);
  gap: 3px;
}

/* Override the beat-gap cols to be narrow */
.step-grid .beat-gap {
  width: 4px;
}

.step-cell {
  width: 100%; aspect-ratio: 1;
  border-radius: 50%;
  background: var(--ball-sm);
  box-shadow: var(--ball-shadow);
  cursor: pointer;
  align-self: center; justify-self: center;
  position: relative;
  transition: background 55ms, box-shadow 55ms, opacity 55ms;
}
/* Ball shine */
.step-cell::before {
  content: '';
  position: absolute; top: 17%; left: 22%;
  width: 28%; height: 28%; border-radius: 50%;
  background: rgba(255,255,255,.50);
  pointer-events: none;
}
/* LED dot below */
.step-cell::after {
  content: '';
  position: absolute; bottom: -5px; left: 50%;
  transform: translateX(-50%);
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(28,24,16,.10);
  pointer-events: none;
}
.step-cell.on {
  background: var(--ball-on);
  box-shadow: 0 1px 3px rgba(0,0,0,.4), inset 0 1px 1px rgba(255,255,255,.08);
}
.step-cell.on::after   { background: var(--green); box-shadow: 0 0 2px var(--green); }
.step-cell.skip        { background: radial-gradient(circle at 35% 30%, #e04040 0%, #901818 100%); }
.step-cell.skip::after { background: var(--red); }
.step-cell.chord { background: radial-gradient(circle at 35% 30%, #e09040 0%, #905010 100%); }
.step-cell.inactive    { opacity: .10; pointer-events: none; }
.step-cell.muted.on    { opacity: .22; }
.step-cell.sel         { outline: 2px solid var(--accent); outline-offset: 1px; }

@keyframes ph-flash {
  0%   { box-shadow: 0 0 0 0   rgba(70,208,32,.80); }
  100% { box-shadow: 0 0 0 8px rgba(70,208,32,0);   }
}
.step-cell.flash { animation: ph-flash .18s ease-out forwards; }

/* ── Track LED + number (left of step row, absolute overlay) ── */
.track-led {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(28,24,16,.10);
  transition: background .06s;
}
.track-led.lit { background: var(--green); box-shadow: 0 0 3px var(--green); }

/* ── Bottom function strip ── */
.bottom-strip {
  flex-shrink: 0;
  height: 28px;
  display: flex; align-items: center;
  gap: 0;
  border-top: 1px solid var(--div);
  padding: 0 4px;
  overflow: hidden;
}
.bs-section {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  border-right: 1px solid var(--div);
  height: 100%;
}
.bs-section:last-child { border-right: none; }
.bs-label {
  font-size: 6px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
}
.bs-attrs {
  display: flex; gap: 8px; align-items: center;
}
.bs-attr {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  cursor: pointer;
}
.bs-attr-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(28,24,16,.12);
  transition: background .08s;
}
.bs-attr-dot.on { background: var(--amber); box-shadow: 0 0 3px var(--amber); }
.bs-attr-name {
  font-size: 5.5px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
}
.bs-attr.active .bs-attr-name { color: var(--text); }

/* page dots */
.page-dots { display: flex; gap: 5px; align-items: center; }
.page-dot {
  width: 6px; height: 6px; border-radius: 50%;
  border: 1.5px solid var(--muted); cursor: pointer;
  transition: background .1s;
}
.page-dot.active { background: var(--text); border-color: var(--text); }

/* ═══════════════════════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════════════════════ */
.panel-right {
  flex: 1; min-width: 0; min-height: 0;
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* SVG fills panel */
#right-svg {
  width: 100%; height: 100%;
  display: block;
  overflow: visible;
}

/* SVG control groups — use pointer-events for interactivity */
.ctrl-group { cursor: pointer; }

/* ── Mode LED + label style (in SVG via foreignObject isn't needed;
      we do everything in SVG) ── */
</style>
</head>
<body>
<div class="device">

  <!-- ══ TOP BAR ══ -->
  <div class="top-bar">
    <span class="brand">BenoQs</span>
    <span class="model">sequencer</span>
  </div>

  <!-- ══ WORKSPACE ══ -->
  <div class="workspace">

    <!-- ════ LEFT PANEL ════ -->
    <div class="panel-left">
      <div class="matrix-region">

        <!-- Clef icons -->
        <div class="clef-col">
          <div class="clef-sym">𝄞</div>
          <div class="clef-sym" style="font-size:22px;margin-top:4px">𝄢</div>
        </div>

        <!-- MIX column (large balls) -->
        <div class="ball-col mix" id="col-mix">
          <span class="ball-col-label">MIX</span>
        </div>

        <!-- SEL column (medium balls) -->
        <div class="ball-col sel" id="col-sel">
          <span class="ball-col-label">SEL</span>
        </div>

        <!-- Attr labels + step grid -->
        <div class="matrix-core">
          <div class="attr-row-labels">
            <!-- Attr labels (left) -->
            <div class="attr-lhs" id="attr-lhs"></div>
            <!-- Step grid with per-row track num/LED -->
            <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;" id="grid-rows"></div>
          </div>
        </div>

        <!-- MUT column -->
        <div class="ball-col mut" id="col-mut">
          <span class="ball-col-label">MUT</span>
        </div>

        <!-- EDIT / CLR column -->
        <div class="ball-col edit" id="col-edit">
          <span class="ball-col-label">EDIT</span>
        </div>

      </div><!-- .matrix-region -->

      <!-- ── Bottom strip ── -->
      <div class="bottom-strip" id="bottom-strip"></div>

    </div><!-- .panel-left -->

    <!-- ════ RIGHT PANEL ════ -->
    <div class="panel-right">
      <svg id="right-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

  </div><!-- .workspace -->
</div><!-- .device -->

<script>
// ════════════════════════════════════════════════════
// Max API bridge (no-op in browser)
// ════════════════════════════════════════════════════
const maxAPI = (function () {
  if (window.max) {
    return { send: (...args) => window.max.outlet(...args) };
  }
  return { send: (...args) => console.log('[maxAPI]', ...args) };
})();

// ════════════════════════════════════════════════════
// Constants
// ════════════════════════════════════════════════════
const T = 10, S = 16;
const ATTR_LABELS = ['VEL','PIT','LEN','STA','POS','DIR','AMT','GRV','MCC','MCH'];
const NOTE_NAMES  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MIX_TARGETS = ['VEL','PIT','LEN','STA','POS','GRV','MCC'];

// ── Layer 1: Outer Arc buttons ──────────────────────
const ARC_BTNS = [
  { id:'grid',  lbl:'GRID',  group:'mode', led:'off'   },
  { id:'page',  lbl:'PAGE',  group:'mode', led:'green' },
  { id:'track', lbl:'TRACK', group:'mode', led:'off'   },
  { id:'step',  lbl:'STEP',  group:'mode', led:'off'   },
  { id:'map',   lbl:'MAP',   group:'mode', led:'off'   },
  { id:'play',  lbl:'PLAY',  group:'mode', led:'white' },
  { id:'scale', lbl:'SCALE', group:'aux',  led:'off'   },
  { id:'tempo', lbl:'TEMPO', group:'aux',  led:'off'   },
  { id:'chord', lbl:'CHORD', group:'aux',  led:'off'   },
  { id:'aln',   lbl:'ALN',   group:'aux',  led:'off'   },
];

// ── Layer 2: Parameter ring ─────────────────────────
const RING_TARGETS = MIX_TARGETS; // 7 items

// ── Layer 3: Pitch spiral ───────────────────────────
// 2 octaves chromatic C3(48)–B4(71) = 24 nodes
const PITCH_NODES = [];
for (let i = 0; i < 24; i++) {
  const midi    = 48 + i;
  const pc      = midi % 12;
  const isSharp = [1,3,6,8,10].includes(pc);
  PITCH_NODES.push({
    id: i, midi, pc, isSharp,
    name: NOTE_NAMES[pc] + (Math.floor(midi / 12) - 1),
    neighbors: [i-1, i+1, i-12, i+12].filter(n => n >= 0 && n < 24),
  });
}

// ── Layer 4: Center cluster ─────────────────────────
const TRANSPORT = [
  { id:'stop',  sym:'■', ledCol:'off',   on:false },
  { id:'play',  sym:'▸', ledCol:'green', on:true  },
  { id:'pause', sym:'⏸', ledCol:'off',   on:false },
  { id:'rec',   sym:'●', ledCol:'red',   on:false },
];
const SCALE_MODES = [
  { id:'chromatic', lbl:'CHR' },
  { id:'major',     lbl:'MAJ' },
  { id:'minor',     lbl:'MIN' },
  { id:'modal',     lbl:'MOD' },
];

// ════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════
const state = {
  playing:       true,
  tempo:         120,
  activePage:    0,
  activeBank:    0,
  selectedTrack: -1,
  selectedStep:  -1,
  selectedAttr:  'vel',
  mixTarget:     'VEL',
  scale:         'chromatic',
  currentMode:   'page',
  auxActive:     {},
  tracks: Array.from({ length: T }, (_, ti) => ({
    length:      16,
    direction:   1,
    speed:       1,
    muted:       false,
    vel:         100,
    mch:         ti + 1,
    grv:         0,
    playheadPos: 0,
    steps: Array.from({ length: S }, () => ({
      active: false, skip: false, hasChord: false,
      pitOffset: 0, velOffset: 0, len: 12, sta: 0, amt: 100,
    }))
  }))
};

// Demo seed — polyrhythmic patterns
(function seed() {
  const pats = [
    [0,4,8,12],[0,6,10],[0,2,4,8,10],[0,3,6,9,12],
    [0,4,8,12],[0,7],[0,2,5,7,10],[0,3,6,9],[0,8],[0,4,8],
  ];
  const lens = [16,15,14,13,16,12,7,11,16,9];
  for (let ti = 0; ti < T; ti++) {
    state.tracks[ti].length = lens[ti];
    pats[ti].forEach(si => { if (si < lens[ti]) state.tracks[ti].steps[si].active = true; });
  }
  state.tracks[3].steps[6].hasChord = true;
  state.tracks[7].steps[3].skip     = true;
})();

// ════════════════════════════════════════════════════
// LEFT PANEL — build
// ════════════════════════════════════════════════════
let painting = null;
const stepEls = [];

function buildSideCol(colId, sz, count) {
  const col = document.getElementById(colId);
  const lbl = col.querySelector('.ball-col-label');
  for (let i = 0; i < count; i++) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px';
    const b   = document.createElement('div');
    b.className = `ball sz-${sz}`;
    b.id = `${colId}-b${i}`;
    const led = document.createElement('div');
    led.className = 'ball-led';
    led.id = `${colId}-led${i}`;
    wrap.appendChild(b);
    wrap.appendChild(led);
    col.insertBefore(wrap, lbl);
  }
}

function buildMatrix() {
  buildSideCol('col-mix',  'lg', T);
  buildSideCol('col-sel',  'md', T);
  buildSideCol('col-mut',  'md', T);
  buildSideCol('col-edit', 'lg', T);

  const attrLhs = document.getElementById('attr-lhs');
  for (let row = 0; row < T; row++) {
    const lbl = document.createElement('div');
    lbl.className = 'attr-lbl' + (ATTR_LABELS[row].toLowerCase() === state.selectedAttr ? ' active' : '');
    lbl.textContent = ATTR_LABELS[row];
    lbl.dataset.attr = ATTR_LABELS[row].toLowerCase();
    lbl.addEventListener('click', () => selectAttr(lbl.dataset.attr));
    attrLhs.appendChild(lbl);
  }

  const gridRows = document.getElementById('grid-rows');
  document.addEventListener('mouseup', () => { painting = null; });

  for (let row = 0; row < T; row++) {
    const ti = T - 1 - row;
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'flex:1;min-height:0;display:flex;align-items:center;gap:3px';

    const tled = document.createElement('div');
    tled.className = 'track-led';
    tled.id = `tled-${ti}`;
    rowEl.appendChild(tled);

    stepEls[ti] = [];
    for (let si = 0; si < S; si++) {
      const cell = document.createElement('div');
      cell.className = 'step-cell';
      cell.dataset.ti = ti; cell.dataset.si = si;
      cell.addEventListener('mousedown', e => { e.preventDefault(); onStepDown(ti, si, e.shiftKey); });
      cell.addEventListener('mouseenter', () => onStepPaint(ti, si));
      stepEls[ti][si] = cell;
      rowEl.appendChild(cell);
      if (si < 15 && (si + 1) % 4 === 0) {
        const gap = document.createElement('div');
        gap.style.cssText = 'flex-shrink:0;width:5px';
        rowEl.appendChild(gap);
      }
    }
    gridRows.appendChild(rowEl);
  }
}

function buildBottomStrip() {
  const strip = document.getElementById('bottom-strip');

  const pgSec   = document.createElement('div');
  pgSec.className = 'bs-section';
  const pgLabel = document.createElement('span');
  pgLabel.className = 'bs-label'; pgLabel.textContent = 'PAGE';
  const dots = document.createElement('div');
  dots.id = 'page-dots'; dots.className = 'page-dots';
  for (let p = 0; p < 8; p++) {
    const d = document.createElement('div');
    d.className = 'page-dot' + (p === 0 ? ' active' : '');
    d.addEventListener('click', () => {
      document.querySelectorAll('.page-dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active'); state.activePage = p;
      maxAPI.send('set_active_page', state.activeBank, p);
    });
    dots.appendChild(d);
  }
  pgSec.append(pgLabel, dots);
  strip.appendChild(pgSec);

  const mxSec   = document.createElement('div');
  mxSec.className = 'bs-section';
  const mxLabel = document.createElement('span');
  mxLabel.className = 'bs-label'; mxLabel.textContent = 'MIX TARGET';
  const mxAttrs = document.createElement('div');
  mxAttrs.className = 'bs-attrs';
  ATTR_LABELS.forEach(a => {
    const item = document.createElement('div');
    item.className = 'bs-attr' + (a.toLowerCase() === state.selectedAttr ? ' active' : '');
    item.dataset.attr = a.toLowerCase();
    const dot  = document.createElement('div');
    dot.className = 'bs-attr-dot' + (a.toLowerCase() === state.selectedAttr ? ' on' : '');
    const name = document.createElement('div');
    name.className = 'bs-attr-name'; name.textContent = a;
    item.append(dot, name);
    item.addEventListener('click', () => selectAttr(a.toLowerCase()));
    mxAttrs.appendChild(item);
  });
  mxSec.append(mxLabel, mxAttrs);
  strip.appendChild(mxSec);
}

function selectAttr(attr) {
  state.selectedAttr = attr;
  document.querySelectorAll('.attr-lbl').forEach(el =>
    el.classList.toggle('active', el.dataset.attr === attr));
  document.querySelectorAll('.bs-attr').forEach(el => {
    const on = el.dataset.attr === attr;
    el.classList.toggle('active', on);
    el.querySelector('.bs-attr-dot')?.classList.toggle('on', on);
  });
  maxAPI.send('set_attr', attr);
}

function onStepDown(ti, si, shift) {
  if (shift) {
    state.tracks[ti].steps[si].skip ^= true;
    maxAPI.send('step_skip_toggle', ti, si);
  } else {
    const next = !state.tracks[ti].steps[si].active;
    state.tracks[ti].steps[si].active = next;
    painting = { value: next };
    maxAPI.send('step_toggle', ti, si);
  }
  state.selectedTrack = ti;
  state.selectedStep  = si;
  renderGrid();
  updatePitchNodes();
}

function onStepPaint(ti, si) {
  if (!painting) return;
  if (state.tracks[ti].steps[si].active !== painting.value) {
    state.tracks[ti].steps[si].active = painting.value;
    renderStep(ti, si);
    maxAPI.send('step_toggle', ti, si);
  }
}

function renderStep(ti, si) {
  const el = stepEls[ti]?.[si];
  if (!el) return;
  const tr = state.tracks[ti], st = tr.steps[si];
  let cls = 'step-cell';
  if (si >= tr.length)                cls += ' inactive';
  else if (st.skip)                   cls += ' skip';
  else if (st.hasChord && st.active)  cls += ' chord on';
  else if (st.active)                 cls += ' on';
  if (tr.muted && st.active)          cls += ' muted';
  if (ti === state.selectedTrack && si === state.selectedStep) cls += ' sel';
  el.className = cls;
}

function renderGrid() {
  for (let ti = 0; ti < T; ti++)
    for (let si = 0; si < S; si++)
      renderStep(ti, si);
}

// ════════════════════════════════════════════════════
// RIGHT PANEL — Spec v0.1 layered SVG
// L1  outer arc      — ARC_BTNS mode/aux segmented controls (10)
// L2  parameter ring — RING_TARGETS mix_target selector (7)
// L3  pitch spiral   — PITCH_NODES musical topology (24, C3–B4)
// L4  center cluster — transport + scale + encoder
// Playheads: LEFT PANEL ONLY
// ════════════════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
let svgW = 0, svgH = 0, CX = 0, CY = 0;
let R_ARC = 0, R_RING = 0, R_SPIR = 0;

const arcBtnEls    = {};
const ringBtnEls   = [];
const pitchNodeEls = [];

function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// Geometry helpers
const ARC_MODE = ARC_BTNS.filter(b => b.group === 'mode');
const ARC_AUX  = ARC_BTNS.filter(b => b.group === 'aux');

function arcBtnAngle(btn) {
  const half = Math.PI * 0.72;
  if (btn.group === 'mode') {
    const i = ARC_MODE.indexOf(btn);
    return -Math.PI * 0.72 + (i / (ARC_MODE.length - 1)) * half;
  } else {
    const i = ARC_AUX.indexOf(btn);
    return (i / (ARC_AUX.length - 1)) * half;
  }
}

function ringTargetPt(i) {
  const a = (i / RING_TARGETS.length) * 2 * Math.PI - Math.PI / 2;
  return { x: CX + R_RING * Math.cos(a), y: CY + R_RING * Math.sin(a), a };
}

// 2-turn Archimedean spiral: C3(n=0) inner → B4(n=23) outer
// 12 nodes/revolution → octave pairs share same angle
function pitchPt(n) {
  const r = R_SPIR * (n + 1) / PITCH_NODES.length;
  const a = (n / 12) * 2 * Math.PI - Math.PI / 2;
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function buildRightPanel() {
  const svg   = document.getElementById('right-svg');
  const panel = svg.parentElement;
  const rect  = panel.getBoundingClientRect();
  svgW = rect.width  || 500;
  svgH = rect.height || 500;
  CX   = svgW * 0.50;
  CY   = svgH * 0.47;

  const minDim = Math.min(svgW, svgH);
  R_ARC  = minDim * 0.40;
  R_RING = minDim * 0.25;
  // Keep the spiral clearly readable on bright displays.
  R_SPIR = minDim * 0.18;

  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.innerHTML = '';
  pitchNodeEls.length = 0;
  ringBtnEls.length   = 0;
  Object.keys(arcBtnEls).forEach(k => delete arcBtnEls[k]);

  const defs = svg.appendChild(mkEl('defs', {}));

  // ── Faint guide circles ──
  [R_ARC, R_RING].forEach(r => {
    svg.appendChild(mkEl('circle', {
      cx: CX, cy: CY, r,
      fill: 'none', stroke: 'rgba(28,24,16,.05)', 'stroke-width': '0.8',
      'stroke-dasharray': '3 5',
    }));
  });

  // ── Arc guide curve (260° sweep) ──
  {
    const a0 = -Math.PI * 0.72, a1 = Math.PI * 0.72;
    const x0 = CX + R_ARC * Math.cos(a0), y0 = CY + R_ARC * Math.sin(a0);
    const x1 = CX + R_ARC * Math.cos(a1), y1 = CY + R_ARC * Math.sin(a1);
    svg.appendChild(mkEl('path', {
      d: `M ${x0.toFixed(1)},${y0.toFixed(1)} A ${R_ARC},${R_ARC} 0 1,1 ${x1.toFixed(1)},${y1.toFixed(1)}`,
      fill: 'none', stroke: 'rgba(28,24,16,.08)', 'stroke-width': '1',
    }));
  }

  // ════ L1: Outer Arc — ARC_BTNS ════
  {
    const bR = R_ARC * 0.065;
    const lR = 2.0;
    const fs = Math.max(6, R_ARC * 0.042);

    ARC_BTNS.forEach(btn => {
      const angle = arcBtnAngle(btn);
      const px = CX + R_ARC * Math.cos(angle);
      const py = CY + R_ARC * Math.sin(angle);

      const gid  = `arcg-${btn.id}`;
      const grad = mkEl('radialGradient', { id: gid, cx:'35%', cy:'30%', r:'65%', fx:'35%', fy:'30%' });
      grad.innerHTML =
        `<stop offset="0%" stop-color="#dedad0"/>` +
        `<stop offset="40%" stop-color="#aca89e"/>` +
        `<stop offset="70%" stop-color="#807870"/>` +
        `<stop offset="100%" stop-color="#5c5450"/>`;
      defs.appendChild(grad);

      const g    = mkEl('g', { cursor: 'pointer', id: `arc-${btn.id}` });
      const ball = mkEl('circle', {
        cx: px.toFixed(1), cy: py.toFixed(1), r: bR.toFixed(1),
        fill: `url(#${gid})`,
        filter: `drop-shadow(0 ${(bR*.14).toFixed(1)}px ${(bR*.35).toFixed(1)}px rgba(0,0,0,.28))`,
      });

      const ledDist = R_ARC + bR * 2.2;
      const ledFill = btn.led === 'green' ? '#46d020' : btn.led === 'white' ? '#e0e0d4' : btn.led === 'amber' ? '#d88820' : 'rgba(28,24,16,.12)';
      const led = mkEl('circle', {
        cx: (CX + ledDist * Math.cos(angle)).toFixed(1),
        cy: (CY + ledDist * Math.sin(angle)).toFixed(1),
        r: lR.toFixed(1), fill: ledFill,
      });
      if (btn.led !== 'off') led.setAttribute('filter', `drop-shadow(0 0 2px ${ledFill})`);

      const lblDist = R_ARC + bR * 4.8;
      const lbl = mkEl('text', {
        x: (CX + lblDist * Math.cos(angle)).toFixed(1),
        y: (CY + lblDist * Math.sin(angle)).toFixed(1),
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        'font-size': fs.toFixed(1),
        'font-family': '-apple-system,Helvetica Neue,sans-serif',
        'letter-spacing': '0.07em',
        fill: 'rgba(28,24,16,.48)',
      });
      lbl.textContent = btn.lbl;

      g.append(ball, led, lbl);
      g.addEventListener('click', () => onArcBtn(btn.id));
      svg.appendChild(g);
      arcBtnEls[btn.id] = { ball, led, lbl };
    });
  }

  // ════ L2: Parameter Ring — 7 RING_TARGETS ════
  {
    const rR = R_RING * 0.072;
    const fs = Math.max(6, R_RING * 0.050);

    RING_TARGETS.forEach((tgt, i) => {
      const { x: px, y: py, a } = ringTargetPt(i);
      const isActive = tgt === state.mixTarget;

      const dot = mkEl('circle', {
        cx: px.toFixed(1), cy: py.toFixed(1), r: rR.toFixed(1),
        fill: isActive ? 'rgba(28,24,16,.62)' : 'rgba(28,24,16,.11)',
        stroke: isActive ? 'rgba(28,24,16,.78)' : 'rgba(28,24,16,.18)',
        'stroke-width': '0.8', cursor: 'pointer',
      });

      const lblDist = R_RING + rR * 3.0;
      const lbl = mkEl('text', {
        x: (CX + lblDist * Math.cos(a)).toFixed(1),
        y: (CY + lblDist * Math.sin(a)).toFixed(1),
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        'font-size': fs.toFixed(1),
        'font-family': '-apple-system,Helvetica Neue,sans-serif',
        'letter-spacing': '0.10em',
        'font-weight': isActive ? '700' : '400',
        fill: isActive ? 'rgba(28,24,16,.76)' : 'rgba(28,24,16,.36)',
      });
      lbl.textContent = tgt;

      dot.addEventListener('click', () => onRingTarget(tgt));
      svg.appendChild(dot);
      svg.appendChild(lbl);
      ringBtnEls[i] = { dot, lbl };
    });
  }

  // ════ L3: Pitch Spiral — musical topology ════
  {
    // Spiral guide polyline
    svg.appendChild(mkEl('polyline', {
      points: PITCH_NODES.map((_, n) => { const p = pitchPt(n); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' '),
      fill: 'none', stroke: 'rgba(28,24,16,.10)', 'stroke-width': '1.0', 'stroke-linejoin': 'round',
      style: 'mix-blend-mode:multiply;',
    }));

    // Octave connector lines (n ↔ n+12)
    for (let n = 0; n < 12; n++) {
      const p0 = pitchPt(n), p1 = pitchPt(n + 12);
      svg.appendChild(mkEl('line', {
        x1: p0.x.toFixed(1), y1: p0.y.toFixed(1),
        x2: p1.x.toFixed(1), y2: p1.y.toFixed(1),
        stroke: 'rgba(28,24,16,.08)', 'stroke-width': '0.6', 'stroke-dasharray': '1.5 2.5',
        style: 'mix-blend-mode:multiply;',
      }));
    }

    // 24 pitch nodes
    const fsLbl = Math.max(4.5, R_SPIR * 0.040);
    PITCH_NODES.forEach((node, n) => {
      const p  = pitchPt(n);
      const nr = node.isSharp ? Math.max(2.0, R_SPIR * 0.040) : Math.max(2.6, R_SPIR * 0.056);
      const isC = node.pc === 0;

      const dot = mkEl('circle', {
        cx: p.x.toFixed(1), cy: p.y.toFixed(1), r: nr.toFixed(1),
        fill:   isC ? 'rgba(28,24,16,.28)' : node.isSharp ? 'rgba(28,24,16,.20)' : 'rgba(28,24,16,.13)',
        stroke: isC ? 'rgba(28,24,16,.50)' : node.isSharp ? 'rgba(28,24,16,.34)' : 'rgba(28,24,16,.24)',
        'stroke-width': '0.7', cursor: 'pointer',
      });

      const lbl = mkEl('text', {
        x: (p.x + nr * 1.7).toFixed(1), y: (p.y + nr * 0.4).toFixed(1),
        'font-size': fsLbl.toFixed(1),
        'font-family': '-apple-system,Helvetica Neue,sans-serif',
        // Hide labels by default to keep the center clean; reveal on hover/selection.
        fill: node.isSharp ? 'rgba(28,24,16,.22)' : 'rgba(28,24,16,.34)',
        opacity: (isC ? '0.55' : '0.00'),
        'pointer-events': 'none',
      });
      lbl.textContent = node.name;

      dot.addEventListener('click', () => onPitchNode(n));
      dot.addEventListener('mouseenter', () => lbl.setAttribute('opacity', '0.70'));
      dot.addEventListener('mouseleave', () => lbl.setAttribute('opacity', isC ? '0.55' : '0.00'));
      svg.appendChild(dot);
      svg.appendChild(lbl);
      pitchNodeEls[n] = { dot, lbl };
    });
  }

  // ════ L4: Center Cluster ════
  buildCenterCluster(svg, defs);

  updateArcNodes();
  updateRingNodes();
  updatePitchNodes();
}

function buildCenterCluster(svg, defs) {
  const fs = Math.max(7, svgH * 0.013);
  const bR = Math.max(4.5, svgH * 0.010);
  const lR = 1.9;
  // Push cluster slightly down to avoid competing with pitch labels.
  const gx = CX, gy = CY + R_SPIR * 0.62;

  // Transport row
  const tpY = gy - bR * 3.5;
  TRANSPORT.forEach((t, i) => {
    const tx  = gx + (i - (TRANSPORT.length - 1) / 2) * (bR * 2.6);
    const gid = `tpg-${t.id}`;
    const gr  = mkEl('radialGradient', { id: gid, cx:'35%', cy:'30%', r:'65%', fx:'35%', fy:'30%' });
    gr.innerHTML = t.on
      ? `<stop offset="0%" stop-color="#606060"/><stop offset="100%" stop-color="#282828"/>`
      : `<stop offset="0%" stop-color="#dedad0"/><stop offset="100%" stop-color="#a0988e"/>`;
    defs.appendChild(gr);

    const g    = mkEl('g', { cursor: 'pointer', id: `tp-${t.id}` });
    const ball = mkEl('circle', {
      cx: tx, cy: tpY, r: bR,
      fill: `url(#${gid})`, filter: `drop-shadow(0 1px 3px rgba(0,0,0,.28))`,
    });
    const ledFill = t.ledCol === 'green' ? '#46d020' : t.ledCol === 'red' ? '#d42020' : t.ledCol === 'amber' ? '#d88820' : 'rgba(28,24,16,.12)';
    const led  = mkEl('circle', { cx: tx, cy: tpY - bR - lR - 1, r: lR, fill: ledFill });
    if (t.ledCol !== 'off') led.setAttribute('filter', `drop-shadow(0 0 2.5px ${ledFill})`);
    const sym  = mkEl('text', {
      x: tx, y: (tpY + fs * 0.32).toFixed(1),
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': (fs * 0.70).toFixed(1), 'font-family': '-apple-system,sans-serif',
      fill: t.on ? '#e8e4dc' : 'rgba(28,24,16,.48)',
    });
    sym.textContent = t.sym;
    g.append(ball, led, sym);
    g.addEventListener('click', () => onTransport(t.id));
    svg.appendChild(g);
  });

  // Scale row (no header text — keep the center uncluttered)
  const scY = gy + bR * 0.35;

  SCALE_MODES.forEach((sc, i) => {
    const sx       = gx + (i - (SCALE_MODES.length - 1) / 2) * (bR * 2.2);
    const isActive = sc.id === state.scale;
    const g   = mkEl('g', { cursor: 'pointer', id: `sc-${sc.id}` });
    const ball = mkEl('circle', {
      cx: sx, cy: scY, r: (bR * 0.70).toFixed(1),
      fill: isActive ? 'rgba(28,24,16,.52)' : 'rgba(28,24,16,.09)',
      stroke: 'rgba(28,24,16,.18)', 'stroke-width': '0.6',
    });
    const lbl = mkEl('text', {
      x: sx, y: (scY + bR * 1.6).toFixed(1),
      'text-anchor': 'middle', 'font-size': (fs * 0.56).toFixed(1),
      'font-family': '-apple-system,Helvetica Neue,sans-serif',
      fill: isActive ? 'rgba(28,24,16,.68)' : 'rgba(28,24,16,.28)',
    });
    lbl.textContent = sc.lbl;
    g.append(ball, lbl);
    g.addEventListener('click', () => onScaleMode(sc.id));
    svg.appendChild(g);
  });

  // Main encoder (top-right quadrant)
  const eR  = Math.max(10, svgH * 0.030);
  const ex  = CX + R_ARC * 1.08;
  const ey  = CY - R_ARC * 0.62;
  const eid = 'enc-g';
  const eg  = mkEl('radialGradient', { id: eid, cx:'33%', cy:'28%', r:'65%', fx:'33%', fy:'28%' });
  eg.innerHTML =
    `<stop offset="0%" stop-color="#e4e0d8"/>` +
    `<stop offset="40%" stop-color="#b8b0a4"/>` +
    `<stop offset="75%" stop-color="#8c8478"/>` +
    `<stop offset="100%" stop-color="#6c6460"/>`;
  defs.appendChild(eg);
  svg.appendChild(mkEl('circle', {
    cx: ex, cy: ey, r: eR, fill: `url(#${eid})`,
    filter: `drop-shadow(0 3px 7px rgba(0,0,0,.42))`, cursor: 'pointer',
  }));
  svg.appendChild(mkEl('ellipse', {
    cx: (ex - eR * 0.20).toFixed(1), cy: (ey - eR * 0.26).toFixed(1),
    rx: (eR * 0.30).toFixed(1), ry: (eR * 0.20).toFixed(1),
    fill: 'rgba(255,255,255,.46)', 'pointer-events': 'none',
  }));
  // Intentionally no "TEMPO" label here — it reads as noise at this scale.
}

// ── Update L1: arc button LEDs ────────────────────────────────
function updateArcNodes() {
  ARC_BTNS.forEach(btn => {
    const els = arcBtnEls[btn.id];
    if (!els) return;
    const isActive = btn.group === 'mode' ? state.currentMode === btn.id : !!(state.auxActive?.[btn.id]);
    const litCol   = btn.led === 'green' ? '#46d020' : btn.led === 'white' ? '#e0e0d4' : btn.led === 'amber' ? '#d88820' : '#46d020';
    const fill     = isActive ? litCol : 'rgba(28,24,16,.12)';
    els.led.setAttribute('fill', fill);
    if (isActive) els.led.setAttribute('filter', `drop-shadow(0 0 3px ${litCol})`);
    else          els.led.removeAttribute('filter');
    els.lbl.setAttribute('fill',        isActive ? 'rgba(28,24,16,.80)' : 'rgba(28,24,16,.44)');
    els.lbl.setAttribute('font-weight', isActive ? '600' : '400');
  });
}

// ── Update L2: ring target dots ───────────────────────────────
function updateRingNodes() {
  RING_TARGETS.forEach((tgt, i) => {
    const els = ringBtnEls[i];
    if (!els) return;
    const isActive = tgt === state.mixTarget;
    els.dot.setAttribute('fill',        isActive ? 'rgba(28,24,16,.62)' : 'rgba(28,24,16,.11)');
    els.dot.setAttribute('stroke',      isActive ? 'rgba(28,24,16,.78)' : 'rgba(28,24,16,.18)');
    els.lbl.setAttribute('fill',        isActive ? 'rgba(28,24,16,.78)' : 'rgba(28,24,16,.36)');
    els.lbl.setAttribute('font-weight', isActive ? '700' : '400');
  });
}

// ── Update L3: pitch node colours ─────────────────────────────
function updatePitchNodes() {
  const selTrack = state.selectedTrack >= 0 ? state.tracks[state.selectedTrack] : null;
  const selStep  = selTrack && state.selectedStep >= 0 ? selTrack.steps[state.selectedStep] : null;

  PITCH_NODES.forEach((node, n) => {
    const els = pitchNodeEls[n];
    if (!els) return;
    const isAssigned = selStep && selStep.pitOffset === node.midi;
    const isC        = node.pc === 0;
    let fill, stroke, r;
    if (isAssigned) {
      fill = 'rgba(210,130,20,.88)'; stroke = 'rgba(210,130,20,.95)';
      r = Math.max(2.8, R_SPIR * 0.062);
    } else if (isC) {
      fill = 'rgba(28,24,16,.30)'; stroke = 'rgba(28,24,16,.52)';
      r = Math.max(2.6, R_SPIR * 0.052);
    } else if (node.isSharp) {
      fill = 'rgba(28,24,16,.20)'; stroke = 'rgba(28,24,16,.34)';
      r = Math.max(2.0, R_SPIR * 0.038);
    } else {
      fill = 'rgba(28,24,16,.12)'; stroke = 'rgba(28,24,16,.24)';
      r = Math.max(2.4, R_SPIR * 0.050);
    }
    els.dot.setAttribute('fill',   fill);
    els.dot.setAttribute('stroke', stroke);
    els.dot.setAttribute('r',      r.toFixed(1));
    // Labels: show C anchors faintly; show assigned pitch; otherwise hidden unless hovered.
    if (isAssigned) els.lbl.setAttribute('opacity', '0.85');
    else if (isC)   els.lbl.setAttribute('opacity', '0.55');
    else            els.lbl.setAttribute('opacity', '0.00');
  });
}

// ── Interactions ──────────────────────────────────────────────
function onArcBtn(id) {
  const btn = ARC_BTNS.find(b => b.id === id);
  if (!btn) return;
  if (btn.group === 'mode') {
    state.currentMode = id;
    maxAPI.send('set_mode', id);
  } else {
    if (!state.auxActive) state.auxActive = {};
    state.auxActive[id] = !state.auxActive[id];
  }
  updateArcNodes();
}

function onRingTarget(tgt) {
  state.mixTarget = tgt;
  selectAttr(tgt.toLowerCase());
  updateRingNodes();
}

function onPitchNode(n) {
  const node = PITCH_NODES[n];
  if (!node || state.selectedTrack < 0 || state.selectedStep < 0) return;
  state.tracks[state.selectedTrack].steps[state.selectedStep].pitOffset = node.midi;
  maxAPI.send('step_pitch', state.selectedTrack, state.selectedStep, node.midi);
  updatePitchNodes();
}

function onScaleMode(id) {
  state.scale = id;
  buildRightPanel();
  maxAPI.send('set_scale', id);
}

function onTransport(id) {
  if (id === 'play') {
    state.playing = !state.playing;
    maxAPI.send('transport', state.playing ? 1 : 0);
  } else if (id === 'stop' || id === 'pause') {
    state.playing = false;
    maxAPI.send('transport', 0);
  } else if (id === 'rec') {
    maxAPI.send('rec_toggle');
  }
}

// ════════════════════════════════════════════════════
// Max → HTML  (jweb script calls)
// ════════════════════════════════════════════════════
window.updateStep = function(ti, si, active, skip, hasChord) {
  ti = +ti; si = +si;
  if (ti < 0 || ti >= T || si < 0 || si >= S) return;
  const st = state.tracks[ti].steps[si];
  st.active = !!+active; st.skip = !!+skip; st.hasChord = !!+hasChord;
  renderStep(ti, si);
  updateArcNodes();
};

window.updatePlayhead = function(ti, pos) {
  ti = +ti; pos = +pos;
  if (ti < 0 || ti >= T) return;
  state.tracks[ti].playheadPos = pos;
  const si  = Math.floor(pos) % S;
  const el  = stepEls[ti]?.[si];
  if (el && state.tracks[ti].steps[si]?.active) {
    el.classList.remove('flash');
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('flash')));
  }
  const led = document.getElementById(`tled-${ti}`);
  if (led) { led.classList.add('lit'); clearTimeout(led._t); led._t = setTimeout(() => led.classList.remove('lit'), 70); }
};

window.setTempo     = bpm => { state.tempo   = Math.round(+bpm || 120); };
window.setTransport = r   => { state.playing = !!+r; };

window.loadPage = json => {
  try {
    const page = JSON.parse(String(json));
    if (!page?.tracks) return;
    page.tracks.forEach((t, ti) => {
      if (ti >= T) return;
      const tr = state.tracks[ti];
      if (t.len)           tr.length    = t.len;
      if (t.dir)           tr.direction = t.dir;
      if (t.muted != null) tr.muted     = !!t.muted;
      if (t.steps) t.steps.forEach((s, si) => {
        if (si >= S) return;
        const st = tr.steps[si];
        if (s.active != null)  st.active   = !!s.active;
        if (s.skip   != null)  st.skip     = !!s.skip;
        if (s.chords != null)  st.hasChord = (s.chords?.length || 0) > 0;
      });
    });
    renderGrid();
    updateArcNodes(); updateRingNodes(); updatePitchNodes();
  } catch (_) {}
};

// ════════════════════════════════════════════════════
// Demo animation (no Max)
// ════════════════════════════════════════════════════
if (typeof window.max === 'undefined') {
  const ticks = new Array(T).fill(0);
  let last = performance.now(), accum = 0;

  (function loop(now) {
    const ms = (60000 / state.tempo) / 4;
    accum += now - last; last = now;
    while (accum >= ms) {
      accum -= ms;
      if (!state.playing) break;
      for (let ti = 0; ti < T; ti++) {
        ticks[ti]++;
        state.tracks[ti].playheadPos = ticks[ti] % state.tracks[ti].length;
      }
      for (let ti = 0; ti < T; ti++) {
        const tr = state.tracks[ti];
        const si = Math.floor(tr.playheadPos) % S;
        if (tr.steps[si]?.active) {
          const el = stepEls[ti]?.[si];
          if (el) { el.classList.remove('flash'); requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('flash'))); }
        }
        const led = document.getElementById(`tled-${ti}`);
        if (led) { led.classList.add('lit'); clearTimeout(led._t); led._t = setTimeout(() => led.classList.remove('lit'), 70); }
      }
      if (ticks[0] % 4 === 0 && state.playing) {
        const playEls = arcBtnEls['play'];
        if (playEls?.led) {
          playEls.led.setAttribute('fill', '#e8e8dc');
          playEls.led.setAttribute('filter', 'drop-shadow(0 0 4px #e0e0d0)');
          clearTimeout(playEls._lt);
          playEls._lt = setTimeout(() => {
            playEls.led.setAttribute('fill', '#e0e0d4');
            playEls.led.setAttribute('filter', 'drop-shadow(0 0 2px #e0e0d4)');
          }, 120);
        }
      }
    }
    requestAnimationFrame(loop);
  })(performance.now());
}

// ════════════════════════════════════════════════════
// Resize + Init
// ════════════════════════════════════════════════════
const ro = new ResizeObserver(() => buildRightPanel());
ro.observe(document.querySelector('.panel-right'));

buildMatrix();
buildBottomStrip();
renderGrid();
requestAnimationFrame(() => buildRightPanel());
</script>
</body>
</html>

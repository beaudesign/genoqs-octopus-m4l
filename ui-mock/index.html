<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Octopus</title>
  <style>
    :root {
      --bg:          #edeae2;
      --divider:     rgba(28,26,20,0.09);
      --cell-off:    rgba(28,26,20,0.10);
      --cell-border: rgba(28,26,20,0.16);
      --cell-on:     #252318;
      --led-off:     rgba(28,26,20,0.11);
      --led-green:   #48d030;
      --led-red:     #d82828;
      --led-amber:   #d89028;
      --led-white:   #e8e8e0;
      --text:        #252318;
      --muted:       rgba(28,26,20,0.42);
      --accent:      #2f60cc;
      --font: -apple-system,"Helvetica Neue",system-ui,sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ══════════════ DEVICE SHELL ══════════════ */
    .device { display: flex; width: 100%; height: 100%; }

    /* ══════════════ LEFT PANEL ══════════════ */
    .panel-left {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      padding: 9px 4px 7px 10px;
      border-right: 1px solid var(--divider);
    }

    .pl-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .logo {
      font-size: 11px; font-style: italic;
      letter-spacing: 0.14em; color: var(--muted);
    }
    .page-dots { display: flex; gap: 5px; align-items: center; }
    .page-dot {
      width: 6px; height: 6px; border-radius: 50%;
      border: 1.5px solid var(--muted); cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .page-dot.active { background: var(--text); border-color: var(--text); }

    /*
      Step matrix — CSS grid with beat-group spacing
      Cols: track-num | track-led | [beat-group ×4] × 4 | attr-label
            14px        9px          (4×1fr + 5px) ×4     30px  = 22 cols
    */
    .step-matrix {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: 14px 9px repeat(4,1fr) 5px repeat(4,1fr) 5px repeat(4,1fr) 5px repeat(4,1fr) 30px;
      grid-template-rows: repeat(10, 1fr);
      column-gap: 2px;
      row-gap: 2px;
      align-items: center;
    }

    .t-num {
      font-size: 7px; color: var(--muted);
      text-align: right; padding-right: 2px;
      align-self: center; line-height: 1;
    }
    .t-led {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--led-off);
      justify-self: center; align-self: center;
      transition: background .05s;
    }
    .t-led.lit { background: var(--led-green); box-shadow: 0 0 3px var(--led-green); }

    .beat-gap { /* spacer cols between beat groups */ }

    .step-cell {
      width: 100%; aspect-ratio: 1;
      border-radius: 50%;
      background: var(--cell-off);
      border: 1px solid var(--cell-border);
      cursor: pointer;
      align-self: center; justify-self: center;
      position: relative;
      transition: background 55ms, border-color 55ms;
    }
    /* Ball shine */
    .step-cell::before {
      content: '';
      position: absolute;
      top: 16%; left: 22%;
      width: 30%; height: 30%;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      pointer-events: none;
    }
    /* LED dot below ball */
    .step-cell::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--led-off);
      pointer-events: none;
    }
    .step-cell.on {
      background: var(--cell-on);
      border-color: var(--cell-on);
    }
    .step-cell.on::before  { background: rgba(255,255,255,0.18); }
    .step-cell.on::after   { background: var(--led-green); box-shadow: 0 0 2px var(--led-green); }
    .step-cell.skip        { background: var(--led-red);   border-color: var(--led-red); }
    .step-cell.skip::after { background: var(--led-red); }
    .step-cell.chord       { background: var(--led-amber); border-color: var(--led-amber); }
    .step-cell.inactive    { opacity: .12; pointer-events: none; }
    .step-cell.muted.on    { opacity: .28; }
    .step-cell.sel         { outline: 2px solid var(--accent); outline-offset: 1px; }

    @keyframes ph-flash {
      0%   { box-shadow: 0 0 0 0   rgba(72,208,48,.75); }
      100% { box-shadow: 0 0 0 7px rgba(72,208,48,0);   }
    }
    .step-cell.flash { animation: ph-flash .17s ease-out forwards; }

    /* Attribute labels — right column, one per track row (hardware order) */
    .t-attr {
      font-size: 6.5px; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
      padding-left: 4px; align-self: center;
      cursor: pointer; white-space: nowrap;
      transition: color .1s;
    }
    .t-attr:hover { color: var(--text); }
    .t-attr.active { color: var(--text); font-weight: 600; }

    .pl-footer {
      flex-shrink: 0; margin-top: 5px;
      display: flex; justify-content: space-between; padding: 0 2px;
    }
    .pl-footer-lbl {
      font-size: 7px; letter-spacing: .13em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ══════════════ RIGHT PANEL ══════════════ */
    .panel-right {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      padding: 9px 10px 7px 5px;
    }

    .circle-wrap {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #circ-svg {
      width: 100%; height: 100%;
      max-width: 310px; max-height: 310px;
      overflow: visible;
    }

    /* ── Controls row ── */
    .controls-row {
      flex-shrink: 0;
      display: flex; gap: 6px;
      padding-top: 6px;
    }
    .ctrl-box {
      border: 1px solid var(--divider);
      border-radius: 5px;
      padding: 5px 8px 6px;
    }
    .ctrl-title {
      font-size: 6.5px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 5px;
    }

    /* MODE */
    .mode-box  { flex: 1.1; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }

    .mode-btn {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .m-led {
      flex-shrink: 0;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--led-off);
      border: 1px solid rgba(28,26,20,0.18);
      transition: background .1s;
    }
    .m-led.on  { background: var(--led-green);  border-color: var(--led-green); }
    .m-led.wht { background: var(--led-white);  box-shadow: 0 0 3px rgba(232,232,224,.7); }
    .mode-btn-label {
      font-size: 7px; letter-spacing: .10em;
      text-transform: uppercase; color: var(--muted);
      transition: color .1s;
    }
    .mode-btn.active .mode-btn-label { color: var(--text); }

    /* SCALE */
    .scale-box { flex: .75; }
    .scale-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* TRANSPORT */
    .transport-box { flex: 1.05; }
    .transport-btns { display: flex; gap: 5px; align-items: center; }
    .tp-btn {
      width: 21px; height: 21px; border-radius: 50%;
      border: 1px solid var(--divider);
      background: rgba(28,26,20,0.05);
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 7px; line-height: 1;
      transition: background .1s, color .1s;
    }
    .tp-btn:hover { background: rgba(28,26,20,0.12); color: var(--text); }
    .tp-btn.on    { background: var(--text); color: #edeae2; border-color: var(--text); }
    /* LED above each transport button */
    .tp-btn::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      width: 3.5px; height: 3.5px; border-radius: 50%;
      background: var(--led-off);
    }
    .tp-btn.lg::before { background: var(--led-green); box-shadow: 0 0 2px var(--led-green); }
    .tp-btn.lw::before { background: var(--led-white); }
    .tp-btn.lr::before { background: var(--led-red);   }
    .tp-btn.lp::before { background: #e060a0; }
  </style>
</head>
<body>
<div class="device">

  <!-- ════════════════ LEFT PANEL ════════════════ -->
  <div class="panel-left">
    <div class="pl-header">
      <span class="logo">octopus</span>
      <div class="page-dots" id="page-dots"></div>
    </div>

    <div class="step-matrix" id="step-matrix"></div>

    <div class="pl-footer">
      <span class="pl-footer-lbl">mix</span>
      <span class="pl-footer-lbl">sel</span>
      <span class="pl-footer-lbl">trk</span>
      <span class="pl-footer-lbl">mute</span>
      <span class="pl-footer-lbl">edit</span>
    </div>
  </div>

  <!-- ════════════════ RIGHT PANEL ════════════════ -->
  <div class="panel-right">
    <div class="circle-wrap">
      <svg id="circ-svg" viewBox="0 0 310 310" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="controls-row">
      <!-- MODE -->
      <div class="ctrl-box mode-box">
        <div class="ctrl-title">mode</div>
        <div class="mode-grid" id="mode-grid"></div>
      </div>

      <!-- SCALE -->
      <div class="ctrl-box scale-box">
        <div class="ctrl-title">scale</div>
        <div class="scale-btns" id="scale-btns"></div>
      </div>

      <!-- TRANSPORT -->
      <div class="ctrl-box transport-box">
        <div class="ctrl-title">transport</div>
        <div class="transport-btns" id="transport-btns"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ──────────────────────────────────────────────────────────────
// Max bridge
// ──────────────────────────────────────────────────────────────
const maxAPI = (() => {
  if (typeof window.max !== 'undefined') return { send: (...a) => window.max.outlet(...a) };
  return { send: (...a) => console.log('[→ Max]', ...a) };
})();

// ──────────────────────────────────────────────────────────────
// Constants
// ──────────────────────────────────────────────────────────────
const T = 10;  // tracks
const S = 16;  // steps per track

const ATTR_LABELS = ['VEL','PIT','LEN','STA','POS','DIR','AMT','GRV','MCC','MCH'];
// Hardware order: VEL on track 9 (top row), MCH on track 0 (bottom row)

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const MODES = [
  { id:'grid',  label:'GRID'  },
  { id:'page',  label:'PAGE'  },
  { id:'track', label:'TRACK' },
  { id:'step',  label:'STEP'  },
  { id:'map',   label:'MAP'   },
  { id:'play',  label:'PLAY'  },
];

const SCALE_BTNS = [
  { id:'mod', label:'MOD' },
  { id:'sel', label:'SEL', on: true },
  { id:'cad', label:'CAD' },
];

// Transport: [id, unicode-symbol, led-class, initially-on]
const TRANSPORT = [
  { id:'cancel', sym:'×',  led:''   },
  { id:'back',   sym:'◂',  led:''   },
  { id:'rec',    sym:'●',  led:'lr' },
  { id:'stop',   sym:'■',  led:''   },
  { id:'pause',  sym:'⏸',  led:''   },
  { id:'play',   sym:'▸',  led:'lg', on: true },
];

// ──────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────
const state = {
  playing:       true,
  tempo:         120,
  activePage:    0,
  activeBank:    0,
  selectedTrack: -1,
  selectedStep:  -1,
  selectedAttr:  'vel',
  currentMode:   'page',
  tracks: Array.from({ length: T }, (_, ti) => ({
    length:      16,
    direction:   1,
    speed:       1,
    offset:      0,
    muted:       false,
    vel:         100,
    mch:         ti + 1,
    grv:         0,
    playheadPos: 0,
    steps: Array.from({ length: S }, () => ({
      active:    false,
      skip:      false,
      hasChord:  false,
      pitOffset: 0,
      velOffset: 0,
      len:       12,
      sta:       0,
      amt:       100,
    }))
  }))
};

// Demo seed — polyrhythmic pattern showing hardware-like layout
(function seed() {
  const pats = [
    [0,4,8,12],       // track 0
    [0,6,10],         // track 1
    [0,2,4,8,10],     // track 2
    [0,3,6,9,12],     // track 3
    [0,4,8,12],       // track 4
    [0,7],            // track 5
    [0,2,5,7,10],     // track 6
    [0,3,6,9],        // track 7
    [0,8],            // track 8
    [0,4,8],          // track 9
  ];
  const lens = [16,15,14,13,16,12,7,11,16,9];
  for (let ti = 0; ti < T; ti++) {
    state.tracks[ti].length = lens[ti];
    pats[ti].forEach(si => {
      if (si < lens[ti]) state.tracks[ti].steps[si].active = true;
    });
  }
  // A couple of chord and skip examples
  state.tracks[3].steps[6].hasChord = true;
  state.tracks[7].steps[3].skip     = true;
})();

// ──────────────────────────────────────────────────────────────
// Page dots
// ──────────────────────────────────────────────────────────────
(function buildPageDots() {
  const c = document.getElementById('page-dots');
  for (let p = 0; p < 8; p++) {
    const d = document.createElement('div');
    d.className = 'page-dot' + (p === 0 ? ' active' : '');
    d.title = `Page ${p + 1}`;
    d.addEventListener('click', () => {
      document.querySelectorAll('.page-dot').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      state.activePage = p;
      maxAPI.send('set_active_page', state.activeBank, p);
    });
    c.appendChild(d);
  }
})();

// ──────────────────────────────────────────────────────────────
// Step matrix
// ──────────────────────────────────────────────────────────────
const stepEls = [];  // [ti][si] → element
let painting = null;

function buildMatrix() {
  const matrix = document.getElementById('step-matrix');
  matrix.innerHTML = '';

  // Rows: track 9 at top → track 0 at bottom (hardware order)
  for (let row = 0; row < T; row++) {
    const ti = T - 1 - row;  // track index

    // Track number
    const numEl = document.createElement('div');
    numEl.className = 't-num';
    numEl.textContent = ti;
    matrix.appendChild(numEl);

    // Track LED
    const ledEl = document.createElement('div');
    ledEl.className = 't-led';
    ledEl.id = `tled-${ti}`;
    matrix.appendChild(ledEl);

    // 16 step cells, with beat-group spacers after every 4
    stepEls[ti] = [];
    for (let si = 0; si < S; si++) {
      const cell = document.createElement('div');
      cell.className = 'step-cell';
      cell.dataset.ti = ti;
      cell.dataset.si = si;
      cell.addEventListener('mousedown', e => { e.preventDefault(); onStepDown(ti, si, e.shiftKey); });
      cell.addEventListener('mouseenter', () => onStepPaint(ti, si));
      stepEls[ti][si] = cell;
      matrix.appendChild(cell);

      // Beat-group spacer after steps 3, 7, 11 (not after 15)
      if ((si + 1) % 4 === 0 && si < 15) {
        const spacer = document.createElement('div');
        spacer.className = 'beat-gap';
        matrix.appendChild(spacer);
      }
    }

    // Attr label — hardware order: row 0 = track 9 = VEL, row 9 = track 0 = MCH
    const attrEl = document.createElement('div');
    attrEl.className = 't-attr' + (ATTR_LABELS[row].toLowerCase() === state.selectedAttr ? ' active' : '');
    attrEl.textContent = ATTR_LABELS[row];
    attrEl.dataset.attr = ATTR_LABELS[row].toLowerCase();
    attrEl.addEventListener('click', () => selectAttr(attrEl.dataset.attr));
    matrix.appendChild(attrEl);
  }

  document.addEventListener('mouseup', () => { painting = null; });
}

function onStepDown(ti, si, shift) {
  if (shift) {
    state.tracks[ti].steps[si].skip ^= true;
    maxAPI.send('step_skip_toggle', ti, si);
  } else {
    const next = !state.tracks[ti].steps[si].active;
    state.tracks[ti].steps[si].active = next;
    painting = { value: next };
    maxAPI.send('step_toggle', ti, si);
  }
  state.selectedTrack = ti;
  state.selectedStep  = si;
  renderGrid();
  updateCircRing(ti);
}

function onStepPaint(ti, si) {
  if (!painting) return;
  if (state.tracks[ti].steps[si].active !== painting.value) {
    state.tracks[ti].steps[si].active = painting.value;
    renderStep(ti, si);
    maxAPI.send('step_toggle', ti, si);
    updateCircRing(ti);
  }
}

function selectAttr(attr) {
  state.selectedAttr = attr;
  document.querySelectorAll('.t-attr').forEach(el =>
    el.classList.toggle('active', el.dataset.attr === attr));
  maxAPI.send('set_attr', attr);
}

function renderStep(ti, si) {
  const el = stepEls[ti]?.[si];
  if (!el) return;
  const tr = state.tracks[ti];
  const st = tr.steps[si];

  let cls = 'step-cell';
  if (si >= tr.length)             cls += ' inactive';
  else if (st.skip)                cls += ' skip';
  else if (st.hasChord && st.active) cls += ' chord on';
  else if (st.active)              cls += ' on';
  if (tr.muted && st.active)       cls += ' muted';
  if (ti === state.selectedTrack && si === state.selectedStep) cls += ' sel';

  el.className = cls;
}

function renderGrid() {
  for (let ti = 0; ti < T; ti++)
    for (let si = 0; si < S; si++)
      renderStep(ti, si);
}

// ──────────────────────────────────────────────────────────────
// Spiral sequencer SVG  —  golden angle / Fibonacci layout
// ──────────────────────────────────────────────────────────────
const NS  = 'http://www.w3.org/2000/svg';
const CX  = 155, CY = 155;   // centre  (viewBox 310×310)
const MAX_R   = 136;          // outermost spiral radius
const NOTE_R  = 148;          // note label orbit radius

// Golden angle: each successive point turns by ~137.508°
const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5)); // ≈ 2.39996 rad

// Total nodes in the spiral = T tracks × S steps = 160
// Index layout: node index n = ti * S + si
// (tracks 0–9 fill inner→outer in groups of 16)
const N_NODES = T * S; // 160

// Pre-compute every spiral node position once
const spiralPts = [];   // [{x,y}]  length 160
function _buildSpiralPts() {
  for (let n = 0; n < N_NODES; n++) {
    const r = MAX_R * Math.sqrt((n + 0.5) / N_NODES);
    const a = n * GOLDEN_ANGLE;
    spiralPts.push({
      x: CX + r * Math.cos(a),
      y: CY + r * Math.sin(a),
    });
  }
}
_buildSpiralPts();

// playhead position along the spiral for each track:
// interpolates between the si-th and (si+1)-th node of that track
function _spiralPlayheadPt(ti, pos) {
  const si0  = Math.floor(pos) % S;
  const si1  = (si0 + 1) % S;
  const frac = pos - Math.floor(pos);
  const n0   = ti * S + si0;
  const n1   = ti * S + si1;
  const p0   = spiralPts[n0], p1 = spiralPts[n1];
  return {
    x: p0.x + (p1.x - p0.x) * frac,
    y: p0.y + (p1.y - p0.y) * frac,
  };
}

function mkEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// Per-step SVG elements
const spiralDotEls  = [];   // [ti][si] → <circle>
const spiralPhEls   = [];   // [ti]     → <circle>  (playhead)
const spiralNumEls  = [];   // [ti]     → <text>    (track label)

function buildCirc() {
  const svg = document.getElementById('circ-svg');
  svg.innerHTML = '';

  // ── Faint guide arcs: one thin arc per track showing its length ──
  // (drawn first so they sit below everything)
  for (let ti = 0; ti < T; ti++) {
    const el = mkEl('polyline', {
      fill: 'none',
      stroke: 'rgba(28,26,20,0.06)',
      'stroke-width': '0.8',
      'stroke-linejoin': 'round',
    });
    el.id = `spiral-arc-${ti}`;
    svg.appendChild(el);
  }

  // ── All step-slot dots (small, drawn before playheads) ──
  for (let ti = 0; ti < T; ti++) {
    spiralDotEls[ti] = [];
    for (let si = 0; si < S; si++) {
      const p   = spiralPts[ti * S + si];
      const dot = mkEl('circle', {
        cx: p.x.toFixed(2), cy: p.y.toFixed(2),
        r: '3.2',
        fill: 'rgba(28,26,20,0.08)',
      });
      svg.appendChild(dot);
      spiralDotEls[ti][si] = dot;
    }
  }

  // ── Track number labels — sit just outside first node of each track ──
  for (let ti = 0; ti < T; ti++) {
    const p0  = spiralPts[ti * S];           // first step of this track
    const mid = spiralPts[ti * S + 7];       // mid-point for anchor dir
    // offset label away from the spiral centre
    const dx  = p0.x - CX, dy = p0.y - CY;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const lbl = mkEl('text', {
      x: (p0.x + (dx / len) * 7).toFixed(1),
      y: (p0.y + (dy / len) * 7).toFixed(1),
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': '5.5',
      'font-family': '-apple-system,Helvetica Neue,sans-serif',
      fill: 'rgba(28,26,20,0.32)',
    });
    lbl.textContent = ti;
    svg.appendChild(lbl);
    spiralNumEls[ti] = lbl;
  }

  // ── Playhead dots (on top) ──
  for (let ti = 0; ti < T; ti++) {
    const ph = mkEl('circle', {
      r: '4.2',
      fill: 'rgba(216,40,40,0.0)',   // invisible until first update
      'stroke-width': '0',
    });
    svg.appendChild(ph);
    spiralPhEls[ti] = ph;
  }

  // ── Chromatic note ring — labels around the outer perimeter ──
  for (let ni = 0; ni < 12; ni++) {
    const a = (ni / 12) * 2 * Math.PI - Math.PI / 2;
    const t = mkEl('text', {
      x: (CX + NOTE_R * Math.cos(a)).toFixed(1),
      y: (CY + NOTE_R * Math.sin(a)).toFixed(1),
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': '6.5',
      'font-family': '-apple-system,Helvetica Neue,sans-serif',
      fill: NOTE_NAMES[ni].includes('#')
        ? 'rgba(28,26,20,0.50)' : 'rgba(28,26,20,0.36)',
      'font-weight': NOTE_NAMES[ni].includes('#') ? '600' : '400',
    });
    t.textContent = NOTE_NAMES[ni];
    svg.appendChild(t);
  }

  // ── Centre dot ──
  svg.appendChild(mkEl('circle', {
    cx: CX, cy: CY, r: '2.5',
    fill: 'rgba(28,26,20,0.16)',
  }));

  // Populate initial state
  for (let ti = 0; ti < T; ti++) updateCircRing(ti);
}

function updateCircRing(ti) {
  if (!spiralDotEls[ti]) return;
  const tr = state.tracks[ti];

  // Guide arc through this track's active steps
  const arcEl = document.getElementById(`spiral-arc-${ti}`);
  if (arcEl) {
    const pts = [];
    for (let si = 0; si < tr.length; si++) {
      const p = spiralPts[ti * S + si];
      pts.push(`${p.x.toFixed(1)},${p.y.toFixed(1)}`);
    }
    arcEl.setAttribute('points', pts.join(' '));
  }

  // Step dots
  for (let si = 0; si < S; si++) {
    const dot = spiralDotEls[ti][si];
    const st  = tr.steps[si];
    let fill, r;
    if (si >= tr.length) {
      fill = 'rgba(28,26,20,0.03)'; r = '2.2';
    } else if (st.skip) {
      fill = 'rgba(216,40,40,0.72)'; r = '3.5';
    } else if (st.hasChord && st.active) {
      fill = 'rgba(200,120,28,0.85)'; r = '3.8';
    } else if (st.active) {
      fill = 'rgba(28,26,20,0.75)'; r = '3.8';
    } else {
      fill = 'rgba(28,26,20,0.10)'; r = '3.0';
    }
    dot.setAttribute('fill', fill);
    dot.setAttribute('r', r);
  }

  _placePlayhead(ti);
}

function _placePlayhead(ti) {
  const ph = spiralPhEls[ti];
  if (!ph) return;
  const tr = state.tracks[ti];
  const p  = _spiralPlayheadPt(ti, tr.playheadPos);
  ph.setAttribute('cx', p.x.toFixed(2));
  ph.setAttribute('cy', p.y.toFixed(2));
  ph.setAttribute('fill', 'rgba(216,40,40,0.90)');
  ph.setAttribute('r', '4.2');
}

// ──────────────────────────────────────────────────────────────
// Mode buttons
// ──────────────────────────────────────────────────────────────
function buildMode() {
  const grid = document.getElementById('mode-grid');
  MODES.forEach(m => {
    const isActive = m.id === state.currentMode;
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (isActive ? ' active' : '');
    btn.dataset.mode = m.id;
    btn.innerHTML =
      `<div class="m-led${isActive ? ' on' : ''}"></div>` +
      `<span class="mode-btn-label">${m.label}</span>`;
    btn.addEventListener('click', () => setMode(m.id));
    grid.appendChild(btn);
  });
}

function setMode(id) {
  state.currentMode = id;
  document.querySelectorAll('.mode-btn').forEach(el => {
    const on = el.dataset.mode === id;
    el.classList.toggle('active', on);
    el.querySelector('.m-led').className = 'm-led' + (on ? ' on' : '');
  });
  maxAPI.send('set_mode', id);
}

// ──────────────────────────────────────────────────────────────
// Scale buttons
// ──────────────────────────────────────────────────────────────
function buildScale() {
  const row = document.getElementById('scale-btns');
  SCALE_BTNS.forEach(s => {
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (s.on ? ' active' : '');
    btn.innerHTML =
      `<div class="m-led${s.on ? ' on' : ''}"></div>` +
      `<span class="mode-btn-label">${s.label}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#scale-btns .mode-btn').forEach(el => {
        el.classList.remove('active');
        el.querySelector('.m-led').className = 'm-led';
      });
      btn.classList.add('active');
      btn.querySelector('.m-led').className = 'm-led on';
      maxAPI.send('scale_mode', s.id);
    });
    row.appendChild(btn);
  });
}

// ──────────────────────────────────────────────────────────────
// Transport buttons
// ──────────────────────────────────────────────────────────────
function buildTransport() {
  const row = document.getElementById('transport-btns');
  TRANSPORT.forEach(tp => {
    const btn = document.createElement('div');
    btn.className = 'tp-btn' + (tp.on ? ' on' : '') + (tp.led ? ` ${tp.led}` : '');
    btn.title = tp.id;
    btn.textContent = tp.sym;
    btn.addEventListener('click', () => onTransport(tp.id, btn));
    row.appendChild(btn);
  });
}

function onTransport(id, btn) {
  if (id === 'play') {
    state.playing = !state.playing;
    btn.classList.toggle('on', state.playing);
    btn.className = btn.className.replace(/\b(lg|lw)\b/g, '').trim();
    if (state.playing) btn.classList.add('lg');
    maxAPI.send('transport', state.playing ? 1 : 0);
  } else if (id === 'stop') {
    state.playing = false;
    document.querySelector('.tp-btn[title="play"]')
      ?.classList.remove('on', 'lg');
    maxAPI.send('transport', 0);
  } else if (id === 'back' || id === 'cancel') {
    maxAPI.send('reset_phase');
  } else if (id === 'rec') {
    btn.classList.toggle('lr');
    btn.classList.toggle('on');
  } else if (id === 'pause') {
    state.playing = false;
    maxAPI.send('transport', 0);
  }
}

// ──────────────────────────────────────────────────────────────
// Max → HTML public API  (called via [script fn args] in jweb)
// ──────────────────────────────────────────────────────────────
window.updateStep = function(ti, si, active, skip, hasChord) {
  ti = +ti; si = +si;
  if (ti < 0 || ti >= T || si < 0 || si >= S) return;
  const st = state.tracks[ti].steps[si];
  st.active   = !!+active;
  st.skip     = !!+skip;
  st.hasChord = !!+hasChord;
  renderStep(ti, si);
  updateCircRing(ti);
};

window.updatePlayhead = function(ti, pos) {
  ti = +ti; pos = +pos;
  if (ti < 0 || ti >= T) return;
  state.tracks[ti].playheadPos = pos;
  _placePlayhead(ti);

  // Flash active step
  const si = Math.floor(pos) % S;
  const el = stepEls[ti]?.[si];
  if (el && state.tracks[ti].steps[si]?.active) {
    el.classList.remove('flash');
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('flash')));
  }
  const led = document.getElementById(`tled-${ti}`);
  if (led) {
    led.classList.add('lit');
    clearTimeout(led._t);
    led._t = setTimeout(() => led.classList.remove('lit'), 70);
  }
};

window.setTempo = function(bpm) {
  state.tempo = Math.round(+bpm || 120);
};

window.setTransport = function(running) {
  state.playing = !!+running;
  const btn = document.querySelector('.tp-btn[title="play"]');
  if (btn) {
    btn.classList.toggle('on', state.playing);
    btn.className = btn.className.replace(/\blg\b/g, '').trim();
    if (state.playing) btn.classList.add('lg');
  }
};

window.loadPage = function(json) {
  try {
    const page = JSON.parse(String(json));
    if (!page?.tracks) return;
    page.tracks.forEach((t, ti) => {
      if (ti >= T) return;
      const tr = state.tracks[ti];
      if (t.len !== undefined)        tr.length    = t.len;
      if (t.dir !== undefined)        tr.direction = t.dir;
      if (t.muted !== undefined)      tr.muted     = !!t.muted;
      if (t.vel !== undefined)        tr.vel       = t.vel;
      if (t.mch !== undefined)        tr.mch       = t.mch;
      if (t.grv !== undefined)        tr.grv       = t.grv;
      if (t.multiplier !== undefined) tr.speed     = parseFloat(t.multiplier) || 1;
      if (t.steps) t.steps.forEach((s, si) => {
        if (si >= S) return;
        const st = tr.steps[si];
        if (s.active     !== undefined) st.active    = !!s.active;
        if (s.skip       !== undefined) st.skip      = !!s.skip;
        if (s.chords     !== undefined) st.hasChord  = (s.chords?.length || 0) > 0;
        if (s.pit_offset !== undefined) st.pitOffset = s.pit_offset;
        if (s.vel_offset !== undefined) st.velOffset = s.vel_offset;
        if (s.len        !== undefined) st.len       = s.len;
        if (s.sta_offset !== undefined) st.sta       = s.sta_offset;
        if (s.amt        !== undefined) st.amt       = s.amt;
      });
    });
    renderGrid();
    buildCirc();
  } catch (_) { /* silent */ }
};

// ──────────────────────────────────────────────────────────────
// Standalone demo animation
// ──────────────────────────────────────────────────────────────
if (typeof window.max === 'undefined') {
  const ticks  = new Array(T).fill(0);
  let lastTime = performance.now();
  let accum    = 0;

  (function loop(now) {
    const ms = (60000 / state.tempo) / 4;  // ms per 1/16 step
    accum += now - lastTime;
    lastTime = now;
    while (accum >= ms) {
      accum -= ms;
      if (!state.playing) break;
      for (let ti = 0; ti < T; ti++) {
        const tr = state.tracks[ti];
        ticks[ti]++;
        const pos = ticks[ti] % tr.length;
        tr.playheadPos = pos;
        _placePlayhead(ti);

        // Flash step cell
        const si = pos % S;
        const el = stepEls[ti]?.[si];
        if (el && tr.steps[si]?.active) {
          el.classList.remove('flash');
          requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('flash')));
        }

        // Pulse track LED
        const led = document.getElementById(`tled-${ti}`);
        if (led) {
          led.classList.add('lit');
          clearTimeout(led._t);
          led._t = setTimeout(() => led.classList.remove('lit'), 70);
        }
      }
    }
    requestAnimationFrame(loop);
  })(performance.now());
}

// ──────────────────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────────────────
buildMatrix();
buildCirc();
buildMode();
buildScale();
buildTransport();
renderGrid();
</script>
